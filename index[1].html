<!DOCTYPE html>
<html>
<head>
    <title>Telangana Colleges Portal</title>
    <style>
        body{
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 0;
            background-color: #f4f4f4;
        }

        header{
            background-color: #4CAF50;
            color: white;
            padding: 20px;
        }

        .search-box{
            margin: 50px 0;
        }

        input{
            width: 300px;
            padding: 10px;
        }

        button{
            padding: 10px 15px;
            cursor: pointer;
        }

        .container{
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 50px;
        }

        .card{
            background: white;
            padding: 20px;
            width: 250px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .card a{
            text-decoration: none;
            color: black;
        }
    </style>
</head>
<body>

<header>
    <h1>Telangana Colleges Portal</h1>
</header>

<div class="search-box">
    <h2>Search Colleges</h2>
    <input type="text" placeholder="Enter College Name">
    <button>Search</button>
</div>

<div class="container">

    <div class="card">
        <a href="engineering.html">
            <h3>Engineering Colleges</h3>
            <p>Click to view all Engineering Colleges</p>
        </a>
    </div>

    <div class="card">
        <a href="counseling.html">
            <h3>Counseling Centers</h3>
            <p>Click to view all Counseling Centers</p>
        </a>
    </div>

    <div class="card">
        <a href="pharmacy.html">
            <h3>Pharmacy Colleges</h3>
            <p>Click to view all Pharmacy Colleges</p>
        </a>
    </div>

</div>

</body>
</html>
